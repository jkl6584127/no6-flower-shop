<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊 - 六號花藝交易所</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-register">

  <!-- ===== Header ===== -->
  <header class="site-header"><nav class="main-nav"><div class="container">
    <a href="index.html" class="logo"><span class="logo-icon">&#127800;</span><div>六號花藝交易所<span class="logo-sub">NO.6 FLOWER EXCHANGE</span></div></a>
    <div class="nav-links"><a href="index.html">首頁</a><a href="products.html">商品總覽</a></div>
  </div></nav></header>

  <!-- ===== Auth Section ===== -->
  <section class="auth-section">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-icon">&#127800;</div>
        <h2>加入我們</h2>
        <p>建立您的帳號</p>
      </div>

      <form>
        <div class="form-group">
          <label>姓名</label>
          <input type="text" placeholder="請輸入姓名" required>
        </div>
        <div class="form-group">
          <label>電子信箱</label>
          <input type="email" placeholder="請輸入電子信箱" required>
        </div>
        <div class="form-group">
          <label>手機號碼</label>
          <input type="tel" placeholder="請輸入手機號碼" required>
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" placeholder="請輸入密碼" required>
        </div>
        <div class="form-group">
          <label>確認密碼</label>
          <input type="password" placeholder="請再次輸入密碼" required>
        </div>
        <div class="form-group">
          <label><input type="checkbox" required> 我同意服務條款與隱私權政策</label>
        </div>
        <button type="submit" class="btn btn--primary btn--block">註冊</button>
      </form>

      <div class="auth-footer">
        已有帳號？<a href="login.html">立即登入</a>
      </div>

    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer"><div class="container"><div class="footer-bottom">&copy; 2026 六號花藝交易所 All Rights Reserved.</div></div></footer>

  <script src="js/main.js"></script>
</body>
</html>
