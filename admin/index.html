<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六號花藝 Admin - 永生花藝管理後台</title>
  <style>
    /* ===== Admin Base Layout ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
      background: #f5f5f5; color: #333; display: flex; min-height: 100vh;
    }

    /* ===== Sidebar ===== */
    .admin-sidebar {
      width: 260px; background: #1e1e2d; color: #a2a3b7;
      position: fixed; top: 0; left: 0; height: 100vh;
      overflow-y: auto; z-index: 100; transition: transform 0.3s ease;
      display: flex; flex-direction: column;
    }
    .admin-sidebar::-webkit-scrollbar { width: 4px; }
    .admin-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .sidebar-header {
      padding: 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-logo { font-size: 1.8rem; }
    .sidebar-brand { display: flex; flex-direction: column; }
    .sidebar-title { font-size: 1.1rem; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .sidebar-version { font-size: 0.7rem; opacity: 0.4; }

    .sidebar-nav { flex: 1; padding: 12px 0; }
    .sidebar-section { margin-bottom: 8px; }
    .sidebar-section-title {
      padding: 12px 20px 6px; font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(255,255,255,0.25);
    }
    .sidebar-menu { list-style: none; }
    .sidebar-menu a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; color: #a2a3b7; text-decoration: none;
      font-size: 0.92rem; transition: all 0.2s; position: relative;
    }
    .sidebar-menu a:hover { color: #fff; background: rgba(255,255,255,0.04); }
    .sidebar-menu a.active {
      color: #d4a574; background: rgba(212,165,116,0.08);
      border-left: 3px solid #d4a574;
    }
    .menu-icon { width: 20px; text-align: center; font-size: 1.05rem; }
    .menu-text { flex: 1; }
    .menu-badge {
      background: #e74c3c; color: #fff; font-size: 0.7rem;
      padding: 1px 7px; border-radius: 10px; font-weight: 600;
    }

    .sidebar-footer {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-footer a {
      display: flex; align-items: center; gap: 10px;
      color: #a2a3b7; text-decoration: none; font-size: 0.88rem;
      padding: 8px 0;
    }
    .sidebar-footer a:hover { color: #fff; }

    /* Sidebar overlay (mobile) */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 99;
    }
    #sidebar-overlay.active { display: block; }

    /* ===== Main Area ===== */
    .admin-main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }

    /* Top bar */
    .admin-topbar {
      height: 56px; background: #fff; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; position: sticky; top: 0; z-index: 90;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    #sidebar-toggle {
      display: none; background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: #666; padding: 4px;
    }
    .topbar-title { font-size: 1.05rem; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-btn {
      background: none; border: none; font-size: 1.1rem;
      cursor: pointer; color: #666; padding: 6px; border-radius: 6px;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }
    .topbar-btn:hover { background: #f5f5f5; color: #333; }
    .topbar-btn-text { font-size: 0.82rem; }
    .notification-dot {
      width: 7px; height: 7px; background: #e74c3c; border-radius: 50%;
      position: relative; top: -8px; left: -6px;
    }
    .user-menu {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 6px 10px; border-radius: 6px;
    }
    .user-menu:hover { background: #f5f5f5; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #fdf6ef; color: #d4a574; font-weight: 700; font-size: 0.82rem;
      display: flex; align-items: center; justify-content: center;
    }
    .user-name { font-size: 0.88rem; font-weight: 500; }

    /* Content */
    .admin-content { padding: 24px; flex: 1; }

    /* Dashboard stats grid */
    #dashboard-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px;
    }

    /* Dashboard panels grid */
    .dashboard-panels {
      display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; margin-bottom: 24px;
    }

    .panel {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .panel h3 { margin: 0 0 16px; font-size: 1rem; }

    .dashboard-bottom {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    }

    /* Settings */
    .settings-panel { display: none; }
    .settings-panel:first-of-type { display: block; }
    .settings-panel .form-group { margin-bottom: 18px; }
    .settings-panel label {
      display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.88rem; color: #555;
    }
    .settings-panel input[type="text"],
    .settings-panel input[type="email"],
    .settings-panel input[type="number"],
    .settings-panel textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.92rem; font-family: inherit;
    }
    .settings-panel input:focus, .settings-panel textarea:focus {
      outline: none; border-color: #d4a574; box-shadow: 0 0 0 3px rgba(212,165,116,0.15);
    }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #f0f0f0;
    }
    .toggle-row label { margin: 0; font-weight: 400; }
    .toggle-switch {
      width: 44px; height: 24px; background: #ccc; border-radius: 12px;
      position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch.active { background: #d4a574; }
    .toggle-switch::after {
      content: ''; width: 20px; height: 20px; background: #fff;
      border-radius: 50%; position: absolute; top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle-switch.active::after { transform: translateX(20px); }

    /* ===== Responsive ===== */
    @media (max-width: 1024px) {
      #dashboard-stats { grid-template-columns: repeat(2, 1fr); }
      .dashboard-panels { grid-template-columns: 1fr; }
      .dashboard-bottom { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .admin-sidebar { transform: translateX(-100%); }
      .admin-sidebar.open { transform: translateX(0); }
      .admin-main { margin-left: 0; }
      #sidebar-toggle { display: block; }
      #dashboard-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">&#127800;</span>
      <div class="sidebar-brand">
        <span class="sidebar-title">六號花藝 Admin</span>
        <span class="sidebar-version">v1.0</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">MAIN</div>
        <ul class="sidebar-menu">
          <li><a href="#" data-page="dashboard" class="active">
            <span class="menu-icon">&#128202;</span>
            <span class="menu-text">儀表板</span>
          </a></li>
          <li><a href="#" data-page="orders">
            <span class="menu-icon">&#128230;</span>
            <span class="menu-text">訂單管理</span>
            <span class="menu-badge">3</span>
          </a></li>
          <li><a href="#" data-page="products">
            <span class="menu-icon">&#127809;</span>
            <span class="menu-text">商品管理</span>
          </a></li>
          <li><a href="#" data-page="customers">
            <span class="menu-icon">&#128101;</span>
            <span class="menu-text">客戶管理</span>
          </a></li>
        </ul>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">SYSTEM</div>
        <ul class="sidebar-menu">
          <li><a href="#" data-page="settings">
            <span class="menu-icon">&#9881;</span>
            <span class="menu-text">網站設定</span>
          </a></li>
        </ul>
      </div>
    </nav>

    <div class="sidebar-footer">
      <a href="../index.html">
        <span class="menu-icon">&#128279;</span>
        <span>回到前台</span>
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="admin-main">

    <!-- Top Bar -->
    <header class="admin-topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" aria-label="切換側邊欄">&#9776;</button>
        <h1 class="topbar-title" id="admin-page-title">儀表板</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" aria-label="通知">
          &#128276;<span class="notification-dot"></span>
        </button>
        <a href="../index.html" class="topbar-btn" target="_blank" title="瀏覽網站">
          &#127760; <span class="topbar-btn-text">瀏覽網站</span>
        </a>
        <div class="user-menu">
          <div class="user-avatar">管</div>
          <span class="user-name">管理員</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="admin-content">

      <!-- ===== Dashboard ===== -->
      <div class="admin-page" data-section="dashboard">
        <div id="dashboard-stats"></div>
        <div class="dashboard-panels">
          <div class="panel" id="revenue-chart"></div>
          <div class="panel" id="recent-orders"></div>
        </div>
        <div class="dashboard-bottom">
          <div class="panel" id="activity-feed"></div>
          <div class="panel" id="top-products"></div>
        </div>
      </div>

      <!-- ===== Orders ===== -->
      <div class="admin-page" data-section="orders" style="display:none;">
        <div id="orders-content"></div>
      </div>

      <!-- ===== Products ===== -->
      <div class="admin-page" data-section="products" style="display:none;">
        <div id="products-content"></div>
      </div>

      <!-- ===== Customers ===== -->
      <div class="admin-page" data-section="customers" style="display:none;">
        <div id="customers-content"></div>
      </div>

      <!-- ===== Settings ===== -->
      <div class="admin-page" data-section="settings" style="display:none;">
        <div class="settings-tabs">
          <button class="settings-tab active" data-tab="general">一般設定</button>
          <button class="settings-tab" data-tab="payment">金流設定</button>
          <button class="settings-tab" data-tab="shipping">物流設定</button>
          <button class="settings-tab" data-tab="notifications">通知設定</button>
        </div>

        <!-- General Settings -->
        <div class="settings-panel panel" id="settings-general">
          <h3>一般設定</h3>
          <div class="form-group">
            <label>商店名稱</label>
            <input type="text" value="六號花藝交易所">
          </div>
          <div class="form-group">
            <label>商店描述</label>
            <textarea rows="3">精選頂級永生花，手工製作，保存3-5年。經典花束、花盒花禮、婚禮系列。</textarea>
          </div>
          <div class="form-group">
            <label>聯絡電話</label>
            <input type="text" value="02-2888-6666">
          </div>
          <div class="form-group">
            <label>聯絡信箱</label>
            <input type="email" value="hello@no6flower.tw">
          </div>
          <div class="form-group">
            <label>商店地址</label>
            <input type="text" value="台北市大安區花藝路88號1樓">
          </div>
          <button class="btn btn-primary settings-save-btn" style="padding:10px 24px;background:#d4a574;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">儲存設定</button>
        </div>

        <!-- Payment Settings -->
        <div class="settings-panel panel" id="settings-payment" style="display:none;">
          <h3>金流設定</h3>
          <div class="toggle-row">
            <label>信用卡付款</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>ATM 轉帳</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>貨到付款</label>
            <div class="toggle-switch" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>LINE Pay</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <br>
          <button class="btn btn-primary settings-save-btn" style="padding:10px 24px;background:#d4a574;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">儲存設定</button>
        </div>

        <!-- Shipping Settings -->
        <div class="settings-panel panel" id="settings-shipping" style="display:none;">
          <h3>物流設定</h3>
          <div class="form-group">
            <label>國內運費 (NT$)</label>
            <input type="number" value="100">
          </div>
          <div class="form-group">
            <label>免運門檻 (NT$)</label>
            <input type="number" value="1500">
          </div>
          <div class="form-group">
            <label>離島運費 (NT$)</label>
            <input type="number" value="150">
          </div>
          <div class="toggle-row">
            <label>開放國際配送</label>
            <div class="toggle-switch" onclick="this.classList.toggle('active')"></div>
          </div>
          <br>
          <button class="btn btn-primary settings-save-btn" style="padding:10px 24px;background:#d4a574;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">儲存設定</button>
        </div>

        <!-- Notification Settings -->
        <div class="settings-panel panel" id="settings-notifications" style="display:none;">
          <h3>通知設定</h3>
          <div class="toggle-row">
            <label>新訂單 Email 通知</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>出貨通知顧客</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>庫存不足提醒</label>
            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
          </div>
          <div class="toggle-row">
            <label>新會員註冊通知</label>
            <div class="toggle-switch" onclick="this.classList.toggle('active')"></div>
          </div>
          <br>
          <button class="btn btn-primary settings-save-btn" style="padding:10px 24px;background:#d4a574;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">儲存設定</button>
        </div>
      </div>

    </div><!-- /.admin-content -->
  </div><!-- /.admin-main -->

  <script src="../js/admin.js"></script>
</body>
</html>
