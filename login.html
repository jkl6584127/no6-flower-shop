<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - 六號花藝交易所</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-login">

  <!-- ===== Header ===== -->
  <header class="site-header"><nav class="main-nav"><div class="container">
    <a href="index.html" class="logo"><span class="logo-icon">&#127800;</span><div>六號花藝交易所<span class="logo-sub">NO.6 FLOWER EXCHANGE</span></div></a>
    <div class="nav-links"><a href="index.html">首頁</a><a href="products.html">商品總覽</a></div>
  </div></nav></header>

  <!-- ===== Auth Section ===== -->
  <section class="auth-section">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-icon">&#127800;</div>
        <h2>歡迎回來</h2>
        <p>登入您的帳號</p>
      </div>

      <form>
        <div class="form-group">
          <label>電子信箱</label>
          <input type="email" placeholder="請輸入電子信箱" required>
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" placeholder="請輸入密碼" required>
        </div>
        <div class="form-row-inline">
          <label><input type="checkbox"> 記住我</label>
          <a href="#">忘記密碼？</a>
        </div>
        <button type="submit" class="btn btn--primary btn--block">登入</button>
      </form>

      <div class="auth-divider">或</div>

      <button class="btn btn--outline btn--block">使用 Google 登入</button>
      <button class="btn btn--outline btn--block">使用 Facebook 登入</button>

      <div class="auth-footer">
        還沒有帳號？<a href="register.html">立即註冊</a>
      </div>

    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer"><div class="container"><div class="footer-bottom">&copy; 2026 六號花藝交易所 All Rights Reserved.</div></div></footer>

  <script src="js/main.js"></script>
</body>
</html>
